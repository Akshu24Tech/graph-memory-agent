services:
  neo4j:
    image: neo4j:5-community
    container_name: gma-neo4j
    ports:
      - "7474:7474"   # HTTP browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      # Password comes from NEO4J_PASSWORD (shell env or the .env file next to this
      # compose file). Falls back to a local dev default if unset. CHANGE before any
      # non-local use. Format: neo4j/<password>
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-akshumind123}"
      # Community Edition: single DB, accept the license
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    volumes:
      - gma-neo4j-data:/data
      - gma-neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  gma-neo4j-data:
  gma-neo4j-logs:
